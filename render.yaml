services:
  - type: web
    name: dev-challenge-platform

    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/devChallenge-0.0.1-SNAPSHOT.jar"

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MYSQLHOST
        sync: false
      - key: MYSQLPORT
        sync: false
      - key: MYSQLDATABASE
        sync: false
      - key: MYSQLUSER
        sync: false
      - key: MYSQLPASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false